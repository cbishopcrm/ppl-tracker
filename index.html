<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="description" content="Spine-safe PPL workout tracker">
<title>PPL Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-left">
      <h1>PPL <span class="accent">Tracker</span></h1>
      <div class="hdr-sub" id="hdrSub">Week A · Gym</div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" id="btnHistory" aria-label="History">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      </button>
      <button class="icon-btn" id="btnSettings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Stats strip -->
  <div class="stats" id="stats"></div>

  <!-- Main content -->
  <main id="main"></main>

  <footer class="footer">
    Based on <a href="https://learn.athleanx.com/articles/push-pull-legs-routine-the-complete-guide" target="_blank" rel="noopener">Athlean-X PPL</a>
    · Spine mods: McGill, Squat University, Contreras
  </footer>
</div>

<!-- Bottom nav -->
<nav class="bnav" id="bnav"></nav>

<!-- Rest timer (floating) -->
<div class="timer" id="timer">
  <div class="timer-ring">
    <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" class="timer-bg"/><circle cx="50" cy="50" r="45" class="timer-fg" id="timerCircle"/></svg>
    <div class="timer-text" id="timerText">0:00</div>
  </div>
  <div class="timer-actions">
    <button class="timer-btn" id="timerMinus">−15</button>
    <button class="timer-btn primary" id="timerSkip">Skip</button>
    <button class="timer-btn" id="timerPlus">+15</button>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="modalSettings">
  <div class="modal">
    <header class="modal-hdr">
      <h2>Settings</h2>
      <button class="icon-btn" data-close-modal="modalSettings" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </header>
    <div class="modal-body">
      <div class="field">
        <label>Location</label>
        <div class="seg" id="locToggle">
          <button data-loc="gym">Gym<small>Full equipment</small></button>
          <button data-loc="hotel">Hotel<small>DBs + bands</small></button>
        </div>
        <div class="hint purple" id="packInfo">Pack: 3 loop bands (light/med/heavy) + 1 door anchor + 1 towel. Under 1 lb total.</div>
      </div>
      <div class="field">
        <label>Week</label>
        <div class="seg" id="weekToggle">
          <button data-week="a">Week A<small>Variant 1</small></button>
          <button data-week="b">Week B<small>Variant 2</small></button>
        </div>
      </div>
      <div class="field">
        <label>Rest timer default</label>
        <div class="seg" id="restToggle">
          <button data-rest="60">60s</button>
          <button data-rest="90">90s</button>
          <button data-rest="120">2m</button>
          <button data-rest="180">3m</button>
        </div>
      </div>
      <div class="field">
        <label>Units</label>
        <div class="seg" id="unitToggle">
          <button data-unit="lb">Pounds</button>
          <button data-unit="kg">Kilograms</button>
        </div>
      </div>
      <div class="field">
        <label>Data</label>
        <div class="btn-row">
          <button class="btn" id="btnExport">Export JSON</button>
          <button class="btn" id="btnImport">Import</button>
          <input type="file" id="importFile" accept="application/json" hidden>
        </div>
        <button class="btn danger" id="btnReset">Reset all data</button>
      </div>
    </div>
  </div>
</div>

<!-- History modal -->
<div class="modal-bg" id="modalHistory">
  <div class="modal">
    <header class="modal-hdr">
      <h2>History</h2>
      <button class="icon-btn" data-close-modal="modalHistory" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </header>
    <div class="modal-body" id="historyBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
